# Oracle DB
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=SYSTEM
spring.datasource.password=1234
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
# 1. Keep this as 'none' so Hibernate doesn't interfere with your manual SQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# 2. ? THE FIX: Change 'always' to 'never' after the first successful run
# Set to 'always' for the very first run, then change to 'never'

# 3. Ensure Hibernate doesn't try to validate before the tables are there

# Disable H2 console
spring.h2.console.enabled=false